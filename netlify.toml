[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Tell Netlify's secrets scanner to ignore these public Vite environment variables.
  # These values are baked into the client-side JS and are intentionally public.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_API_KEY,VITE_GATEWAY_URL,API_KEY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"
